<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="login/logins.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/assets-css/password-validator.css">
    <link rel="stylesheet" href="/assets/assets-css/site.css">
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login in</title>
</head>
<body>
    <div class="login-container">
        <a href="index.html" class="back-btn" title="Back to Home">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h2>Login </h2>
        <form action="/dashboard/index.html" method="post" class="login-form">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <br>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <div id="password-feedback" aria-live="polite" class="password-feedback">
                <ul class="pw-checklist">
                    <li data-check="length"><span class="icon">✖</span> At least 6 characters</li>
                    <li data-check="upper"><span class="icon">✖</span> Uppercase letter</li>
                    <li data-check="lower"><span class="icon">✖</span> Lowercase letter</li>
                    <li data-check="number"><span class="icon">✖</span> Number</li>
                    <li data-check="special"><span class="icon">✖</span> Special character</li>
                </ul>
            </div>
            <br>
            <button type="submit" id="login-btn">Login</button>
        </form>
    <p>Don't have an account? <a href="registration.html">Register here</a></p>
    </div>


    <script src="/assets/assets-js/password-validator.js"></script>
    <script src="login/logins.js"></script>
    <script src="/assets/assets-js/profile.js"></script>
    <footer style="background: var(--color-bg-dark); border-top: 2px solid var(--color-charcoal-mid); padding: var(--space-8) 0;">
        <div class="container flex-between">
            <span class="navbar__brand" style="font-size: var(--text-lg);">
                <span>Tech</span>Hive
            </span>
            <p style="color: var(--color-charcoal-light); font-size: var(--text-sm);">
                &copy; 2026 TechHive. All rights reserved.
            </p>
        </div>
    </footer>
</body>
</html>
